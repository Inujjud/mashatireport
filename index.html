<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاتي السعودية — نظام التقارير</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C0000A; --red-bg:#FEF0F0;
  --black:#0D0D0D; --dark:#1E1E1E;
  --gray1:#F5F5F5; --gray2:#E8E8E8; --gray3:#9B9B9B; --gray4:#555;
  --white:#FFFFFF;
  --warn:#B85C00; --warn-bg:rgba(184,92,0,.08);
  --ok:#1A7A3C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans Arabic",Tahoma,Arial,sans-serif;background:#F0F0F0;color:var(--black);min-height:100vh;direction:rtl}

/* ====== LOGIN ====== */
#login{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:360px;text-align:center}
.login-logo{width:100px;height:100px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--gray3);margin-bottom:28px}
.login-box input{width:100%;padding:13px 16px;border:2px solid var(--gray2);border-radius:10px;font-family:inherit;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:12px;transition:.2s}
.login-box input:focus{outline:none;border-color:var(--red)}
.login-btn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* ====== APP ====== */
#app{display:none}
.topbar{background:var(--black);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo img{width:38px;height:38px;object-fit:contain}
.topbar-logo-text{color:#fff;font-size:14px;font-weight:700}
.topbar-logo-sub{color:#666;font-size:10px}
.topbar-nav{display:flex;gap:4px}
.nav-btn{background:transparent;border:none;color:#888;font-family:inherit;font-size:12px;font-weight:600;padding:7px 16px;border-radius:7px;cursor:pointer;transition:.2s}
.nav-btn.active{background:var(--red);color:#fff}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.topbar-out{background:none;border:1px solid #333;color:#666;padding:6px 14px;border-radius:7px;font-family:inherit;font-size:11px;cursor:pointer;transition:.2s}
.topbar-out:hover{border-color:var(--red);color:var(--red)}

/* ====== VIEWS ====== */
.view{display:none}.view.active{display:block}

/* ====== REPORTS LIST ====== */
.page-wrap{max-width:1060px;margin:0 auto;padding:28px 24px}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700}
.btn-red{background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-red:hover{opacity:.88}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}
.rcard{background:#fff;border:1px solid var(--gray2);border-radius:13px;overflow:hidden;cursor:pointer;transition:.2s}
.rcard:hover{border-color:var(--red);box-shadow:0 4px 18px rgba(192,0,10,.1);transform:translateY(-2px)}
.rcard-top{background:var(--black);padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
.rcard-top img{width:40px;height:40px;object-fit:contain}
.rcard-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.rcard-badge.draft{background:rgba(184,92,0,.15);color:var(--warn)}
.rcard-badge.final{background:rgba(26,122,60,.15);color:var(--ok)}
.rcard-body{padding:14px 18px}
.rcard-proj{font-size:15px;font-weight:700;margin-bottom:3px}
.rcard-client{font-size:11px;color:var(--red);font-weight:600;margin-bottom:10px}
.rcard-meta{display:flex;gap:14px;font-size:10px;color:var(--gray3)}
.empty{text-align:center;padding:70px 20px;grid-column:1/-1;color:var(--gray3)}
.empty svg{width:48px;height:48px;opacity:.3;margin-bottom:14px}
.empty h3{font-size:18px;font-weight:700;color:var(--black);margin-bottom:8px}
.empty p{font-size:13px;margin-bottom:20px}

/* ====== BUILDER ====== */
.builder-wrap{max-width:1160px;margin:0 auto;padding:24px}
.builder-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.builder-title{font-size:18px;font-weight:700}
.builder-btns{display:flex;gap:8px}
.btn-dark{background:var(--dark);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.btn-dark:hover{opacity:.8}
.btn-green{background:var(--ok);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.btn-green:hover{opacity:.9}
.btn-print{background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.btn-print:hover{opacity:.9}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.col{display:flex;flex-direction:column;gap:18px}

.card{background:#fff;border:1px solid var(--gray2);border-radius:13px;overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:10px}
.card-hd-icon{width:30px;height:30px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-hd-icon svg{display:block}
.card-hd-title{font-size:13px;font-weight:700}
.card-body{padding:18px;display:flex;flex-direction:column;gap:13px}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;color:var(--gray3);text-transform:uppercase;letter-spacing:.7px}
.field input,.field select,.field textarea{background:var(--gray1);border:1.5px solid var(--gray2);border-radius:8px;padding:9px 13px;font-family:inherit;font-size:13px;color:var(--black);transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);background:#fff}
.field textarea{resize:vertical;min-height:88px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.dmg-row{display:flex;gap:8px}
.dmg-btn{flex:1;padding:9px 6px;border-radius:8px;border:1.5px solid var(--gray2);background:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;text-align:center;color:var(--gray3)}
.dmg-btn[data-l="low"].on{background:rgba(26,122,60,.08);border-color:var(--ok);color:var(--ok)}
.dmg-btn[data-l="medium"].on{background:var(--warn-bg);border-color:var(--warn);color:var(--warn)}
.dmg-btn[data-l="high"].on{background:var(--red-bg);border-color:var(--red);color:var(--red)}

/* upload */
.upload-zone{border:2px dashed var(--gray2);border-radius:10px;padding:22px;text-align:center;cursor:pointer;background:var(--gray1);transition:.2s}
.upload-zone:hover{border-color:var(--red);background:#fff8f8}
.upload-zone input{display:none}
.upload-zone svg{display:block;margin:0 auto 8px;color:var(--gray3)}
.upload-label{font-size:12px;color:var(--gray3)}
.upload-label strong{color:var(--red)}
.prog{display:none;height:4px;background:var(--gray2);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-bar{height:100%;background:var(--red);width:0;transition:width .3s}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.pthumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1.5px solid var(--gray2)}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.pthumb .pdel{position:absolute;top:4px;left:4px;width:20px;height:20px;background:rgba(192,0,10,.9);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.pthumb:hover .pdel{opacity:1}
.pthumb .pcap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);border:none;color:#fff;font-size:9px;padding:4px 6px;font-family:inherit;width:100%}

/* obs / rec */
.obs-list,.rec-list{display:flex;flex-direction:column;gap:7px}
.obs-item{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px}
.obs-item.danger{background:var(--red-bg);border-right:3px solid var(--red)}
.obs-item.warning{background:var(--warn-bg);border-right:3px solid var(--warn)}
.obs-item.info{background:var(--gray1);border-right:3px solid var(--gray3)}
.obs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.obs-item.danger .obs-dot{background:var(--red)}
.obs-item.warning .obs-dot{background:var(--warn)}
.obs-item.info .obs-dot{background:var(--gray3)}
.obs-text{flex:1;font-size:12px;line-height:1.5}
.obs-del{background:none;border:none;color:var(--gray3);cursor:pointer;font-size:13px;padding:0;line-height:1;transition:.2s}
.obs-del:hover{color:var(--red)}
.rec-item{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;background:var(--gray1);border-radius:8px}
.rec-num{width:20px;height:20px;min-width:20px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.rec-text{flex:1;font-size:12px;line-height:1.5}
.add-row{display:flex;gap:7px;margin-top:4px}
.add-row input{flex:1;padding:8px 12px;border:1.5px solid var(--gray2);border-radius:8px;font-family:inherit;font-size:12px;background:var(--gray1)}
.add-row input:focus{outline:none;border-color:var(--red);background:#fff}
.add-row select{padding:8px 10px;border:1.5px solid var(--gray2);border-radius:8px;font-family:inherit;font-size:11px;background:var(--gray1);width:84px}
.btn-add{background:var(--dark);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

/* ====== PREVIEW STRIP ====== */
.prev-strip{margin-top:18px;background:#fff;border:1px solid var(--gray2);border-radius:13px;overflow:hidden}
.prev-strip-hd{padding:12px 18px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;justify-content:space-between}
.prev-strip-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--black)}
.prev-wrap{background:#E4E4E4;padding:20px;display:flex;justify-content:center;overflow-x:auto}

/* ====== REPORT PREVIEW ====== */
.rpt{width:760px;background:#fff;font-family:"IBM Plex Sans Arabic",Tahoma,Arial,sans-serif;color:var(--black);direction:rtl}
.rpt-cover{background:var(--black);padding:32px 40px;display:flex;flex-direction:column;gap:16px}
.rpt-cover-top{display:flex;align-items:flex-start;justify-content:space-between}
.rpt-co{display:flex;flex-direction:column;gap:3px}
.rpt-co-name{font-size:17px;font-weight:700;color:#fff}
.rpt-co-sub{font-size:9px;color:#666;direction:ltr;text-align:right}
.rpt-logo{width:56px;height:56px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rpt-logo img{width:100%;height:100%;object-fit:contain}
.rpt-badge{display:inline-block;padding:4px 12px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:4px;letter-spacing:.5px}
.rpt-proj{font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin:8px 0 4px}
.rpt-client{font-size:12px;color:#aaa}
.rpt-meta{display:flex;gap:24px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}
.rpt-meta-item{display:flex;flex-direction:column;gap:2px}
.rpt-meta-lbl{font-size:7px;color:#555;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.rpt-meta-val{font-size:11px;color:#ccc;font-weight:500}
.rpt-body{padding:26px 40px}
.rpt-sec{margin-bottom:22px}
.rpt-sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gray2)}
.rpt-sec-num{width:24px;height:24px;background:var(--red);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rpt-sec-title{font-size:13px;font-weight:700}
.rpt-sec-sub{font-size:9px;color:var(--gray3);font-weight:400}
.rpt-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rpt-info-card{background:var(--gray1);border-radius:7px;padding:10px 12px;border-right:2px solid var(--red)}
.rpt-info-lbl{font-size:8px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.rpt-info-val{font-size:12px;font-weight:700}
.rpt-dmg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.rpt-dmg.low{background:rgba(26,122,60,.1);color:var(--ok);border:1px solid rgba(26,122,60,.3)}
.rpt-dmg.medium{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(184,92,0,.3)}
.rpt-dmg.high{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,0,10,.3)}
.rpt-dmg-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.rpt-dmg.low .rpt-dmg-dot{background:var(--ok)}
.rpt-dmg.medium .rpt-dmg-dot{background:var(--warn)}
.rpt-dmg.high .rpt-dmg-dot{background:var(--red)}
.rpt-desc{font-size:12px;line-height:1.9;color:#333;text-align:justify}
.rpt-photos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.rpt-photo{border-radius:8px;overflow:hidden;border:1px solid var(--gray2)}
.rpt-photo img{width:100%;height:180px;object-fit:cover;display:block}
.rpt-photo-cap{background:var(--black);color:#fff;padding:7px 11px;font-size:10px;display:flex;align-items:center;gap:7px}
.rpt-photo-n{background:var(--red);color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rpt-obs-list{display:flex;flex-direction:column;gap:6px}
.rpt-obs-item{display:flex;gap:8px;padding:9px 12px;border-radius:7px;align-items:flex-start}
.rpt-obs-item.danger{background:var(--red-bg);border-right:2px solid var(--red)}
.rpt-obs-item.warning{background:var(--warn-bg);border-right:2px solid var(--warn)}
.rpt-obs-item.info{background:var(--gray1);border-right:2px solid var(--gray3)}
.rpt-obs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rpt-obs-item.danger .rpt-obs-dot{background:var(--red)}
.rpt-obs-item.warning .rpt-obs-dot{background:var(--warn)}
.rpt-obs-item.info .rpt-obs-dot{background:var(--gray3)}
.rpt-obs-text{font-size:11px;color:#333;line-height:1.6}
.rpt-rec-list{display:flex;flex-direction:column;gap:6px}
.rpt-rec-item{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;background:var(--gray1);border-radius:7px}
.rpt-rec-num{width:18px;height:18px;min-width:18px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.rpt-rec-text{font-size:11px;color:#333;line-height:1.6;padding-top:1px}
.rpt-footer{padding:14px 40px;border-top:2px solid var(--gray2);display:flex;align-items:center;justify-content:space-between}
.rpt-footer-co{font-size:10px;color:var(--gray3);font-weight:600}
.rpt-footer-conf{font-size:9px;color:#ccc}
.rpt-footer-num{font-size:9px;color:var(--gray3)}

/* ====== TOAST ====== */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:#fff;padding:11px 22px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;transition:.3s;border-right:3px solid var(--red);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:3px}
</style>
</head>

              <div class="card-hd-title">بيانات العميل والمشروع</div>
            </div>
            <div class="card-body">
              <div class="field"><label>اسم العميل</label><input id="f-client" placeholder="مثال: م. نجود الحربي" oninput="rp()"></div>
              <div class="field"><label>اسم المشروع</label><input id="f-proj" placeholder="مثال: ترميم دار المدينة التراثية" oninput="rp()"></div>

                <div class="field"><label>الموقع</label><input id="f-loc" placeholder="المدينة المنورة" oninput="rp()"></div>

              </div>

                <div class="field"><label>تاريخ الزيارة</label><input type="date" id="f-date" oninput="rp()"></div>

              <div class="card-hd-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>

              <div class="card-hd-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>

            </div>

const TYPES={preliminary:'دراسة وتقرير أولي',structural:'تقرير حالة إنشائية',heritage:'توثيق تراثي أولي',restoration:'دراسة ترميم'};
const MATS={'stone-mud':'حجر + طين',mud:'طين (لبن)',stone:'حجر بازلتي',limestone:'حجر جيري',mixed:'مواد مختلطة'};
const DMG={low:{ar:'خفيف',cls:'low'},medium:{ar:'متوسط',cls:'medium'},high:{ar:'شديد',cls:'high'}};

let S={id:null,clientName:'',projectName:'',location:'',reportNum:'',visitDate:'',engineerName:'',reportType:'preliminary',floors:'دوران',area:'',materials:'stone-mud',damageLevel:'medium',description:'',observations:[],recommendations:[],photos:[]};

async function sb(method,path,body){
  const r=await fetch(`${SB}/rest/v1/${path}`,{method,headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':method==='PATCH'?'return=representation':''},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}

function login(){
  if(document.getElementById('pw').value===PW){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    loadList();
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pw').value='';
  }
}
function logout(){document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('pw').value='';document.getElementById('loginErr').style.display='none';}

function showTab(t){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='list')loadList();
}

function setDmg(l){S.damageLevel=l;document.querySelectorAll('.dmg-btn').forEach(b=>b.classList.toggle('on',b.dataset.l===l));rp();}

async function handlePhotos(input){
  const files=Array.from(input.files).slice(0,10-S.photos.length);
  const prog=document.getElementById('prog'),bar=document.getElementById('progBar');
  prog.style.display='block';
  let done=0;
  for(const f of files){
    const path=`reports/${Date.now()}_${Math.random().toString(36).slice(2)}.${f.name.split('.').pop()}`;
    const i=S.photos.length;
    S.photos.push({url:URL.createObjectURL(f),caption:'',uploading:true,path});
    renderPhotos();
    try{
      const res=await fetch(`${SB}/storage/v1/object/report-photos/${path}`,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':f.type},body:f});
      if(res.ok)S.photos[i]={url:`${SB}/storage/v1/object/public/report-photos/${path}`,caption:'',uploading:false,path};
    }catch(e){S.photos.splice(i,1);}
    done++;bar.style.width=(done/files.length*100)+'%';
    renderPhotos();rp();
  }
  setTimeout(()=>{prog.style.display='none';bar.style.width='0';},800);
  input.value='';
}
function renderPhotos(){
  document.getElementById('pgrid').innerHTML=S.photos.map((p,i)=>`<div class="pthumb"><img src="${p.url}"><button class="pdel" onclick="delP(${i})">✕</button><input class="pcap" placeholder="تعليق..." value="${p.caption||''}" oninput="S.photos[${i}].caption=this.value;rp()"></div>`).join('');
}
function delP(i){S.photos.splice(i,1);renderPhotos();rp();}

function addObs(){const inp=document.getElementById('obsInp'),lvl=document.getElementById('obsLvl').value;if(!inp.value.trim())return;S.observations.push({level:lvl,text:inp.value.trim()});inp.value='';renderObs();rp();}
function delObs(i){S.observations.splice(i,1);renderObs();rp();}
function renderObs(){document.getElementById('obsList').innerHTML=S.observations.map((o,i)=>`<div class="obs-item ${o.level}"><div class="obs-dot"></div><span class="obs-text">${o.text}</span><button class="obs-del" onclick="delObs(${i})">✕</button></div>`).join('');}

function addRec(){const inp=document.getElementById('recInp');if(!inp.value.trim())return;S.recommendations.push(inp.value.trim());inp.value='';renderRec();rp();}
function delRec(i){S.recommendations.splice(i,1);renderRec();rp();}
function renderRec(){document.getElementById('recList').innerHTML=S.recommendations.map((r,i)=>`<div class="rec-item"><div class="rec-num">${i+1}</div><div class="rec-text">${r}</div><button class="obs-del" onclick="delRec(${i})">✕</button></div>`).join('');}

function syncS(){
  S.clientName=document.getElementById('f-client').value;
  S.projectName=document.getElementById('f-proj').value;
  S.location=document.getElementById('f-loc').value;
  S.reportNum=document.getElementById('f-num').value;
  S.visitDate=document.getElementById('f-date').value;
  S.engineerName=document.getElementById('f-eng').value;
  S.reportType=document.getElementById('f-type').value;
  S.floors=document.getElementById('f-floors').value;
  S.area=document.getElementById('f-area').value;
  S.materials=document.getElementById('f-mat').value;
  S.description=document.getElementById('f-desc').value;
}

function rp(){syncS();buildPreview(document.getElementById('rptDoc'));}

function buildPreview(el){
  const dateAr=S.visitDate?new Date(S.visitDate).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}):'—';
  const dmg=DMG[S.damageLevel];
  let n=2;

async function saveReport(){
  syncS();
  toast('جاري الحفظ...');
  const p={report_num:S.reportNum,report_type:S.reportType,client_name:S.clientName,project_name:S.projectName,location:S.location,visit_date:S.visitDate||null,engineer_name:S.engineerName,floors:S.floors,area:S.area,materials:S.materials,damage_level:S.damageLevel,description:S.description,observations:S.observations,recommendations:S.recommendations,photos:S.photos.map(x=>({url:x.url,caption:x.caption,path:x.path})),status:'draft'};
  try{
    if(S.id){await sb('PATCH',`reports?id=eq.${S.id}`,p);toast('تم التحديث');}
    else{const r=await sb('POST','reports',p);if(r&&r[0])S.id=r[0].id;toast('تم الحفظ');}
  }catch(e){toast('خطأ في الحفظ');}
}

async function finalReport(){
  if(!S.id)await saveReport();
  try{await sb('PATCH',`reports?id=eq.${S.id}`,{status:'final'});toast('تم الاعتماد النهائي');}
  catch(e){toast('خطأ');}
}

async function loadList(){
  const g=document.getElementById('cardsGrid');
  g.innerHTML='<div class="empty" style="grid-column:1/-1"><p>جاري التحميل...</p></div>';
  try{
    const data=await sb('GET','reports?order=created_at.desc&limit=50');
    if(!data||!data.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><h3>لا توجد تقارير بعد</h3><p>ابدأ بإنشاء أول تقرير أولي</p><button class="btn-red" onclick="newReport();showTab('build')">+ تقرير جديد</button></div>`;return;}
    g.innerHTML=data.map(r=>`<div class="rcard" onclick="openReport('${r.id}')"><div class="rcard-top"><img src="${LOGO}" alt="مشاتي"><span class="rcard-badge ${r.status||'draft'}">${r.status==='final'?'نهائي':'مسودة'}</span></div><div class="rcard-body"><div class="rcard-proj">${r.project_name||'بدون اسم'}</div><div class="rcard-client">${r.client_name||'—'}</div><div class="rcard-meta"><span>📍 ${r.location||'—'}</span><span>📅 ${r.visit_date||'—'}</span></div></div></div>`).join('');
  }catch(e){g.innerHTML='<div class="empty" style="grid-column:1/-1"><p>تعذّر التحميل</p></div>';}
}

async function openReport(id){
  toast('جاري التحميل...');
  try{
    const data=await sb('GET',`reports?id=eq.${id}`);
    const r=data[0];if(!r)return;
    S={id:r.id,clientName:r.client_name||'',projectName:r.project_name||'',location:r.location||'',reportNum:r.report_num||'',visitDate:r.visit_date||'',engineerName:r.engineer_name||'',reportType:r.report_type||'preliminary',floors:r.floors||'دوران',area:r.area||'',materials:r.materials||'stone-mud',damageLevel:r.damage_level||'medium',description:r.description||'',observations:r.observations||[],recommendations:r.recommendations||[],photos:(r.photos||[]).map(p=>(({...p,uploading:false}))),};
    fillForm();renderObs();renderRec();renderPhotos();rp();
    document.getElementById('bTitle').textContent=S.projectName||'تقرير';
    showTab('build');toast('تم فتح التقرير');
  }catch(e){toast('خطأ في التحميل');}
}

function fillForm(){
  [['f-client','clientName'],['f-proj','projectName'],['f-loc','location'],['f-num','reportNum'],['f-date','visitDate'],['f-eng','engineerName'],['f-area','area'],['f-desc','description']].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.value=S[k]||'';}); 
  document.getElementById('f-type').value=S.reportType;
  document.getElementById('f-floors').value=S.floors;
  document.getElementById('f-mat').value=S.materials;
  document.querySelectorAll('.dmg-btn').forEach(b=>b.classList.toggle('on',b.dataset.l===S.damageLevel));
}

function newReport(){
  S={id:null,clientName:'',projectName:'',location:'',reportNum:`RPT-${new Date().getFullYear()}-${String(Date.now()).slice(-3)}`,visitDate:new Date().toISOString().split('T')[0],engineerName:'',reportType:'preliminary',floors:'دوران',area:'',materials:'stone-mud',damageLevel:'medium',description:'',observations:[],recommendations:[],photos:[]};
  fillForm();renderObs();renderRec();renderPhotos();rp();
  document.getElementById('bTitle').textContent='تقرير جديد';
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

document.addEventListener('DOMContentLoaded',()=>{
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value=today;
  S.visitDate=today;
  S.reportNum=`RPT-${new Date().getFullYear()}-${String(Date.now()).slice(-3)}`;
  document.getElementById('f-num').value=S.reportNum;
  rp();
});
</script>
</body></html>
