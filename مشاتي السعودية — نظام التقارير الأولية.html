<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاتي السعودية — نظام التقارير الأولية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0000A; --red-d:#9d0008; --black:#0d0d0d; --ink:#1a1a1a;
  --gray:#6b7280; --gray2:#9ca3af; --line:#e5e7eb; --bg:#f4f5f7;
  --card:#ffffff; --soft:#f8f9fb; --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 6px 20px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
.hidden{display:none!important}
svg.ic{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;
  justify-content:center;z-index:100}
.login-card{width:380px;max-width:90vw;text-align:center;padding:40px 32px}
.login-logo{width:96px;height:96px;margin:0 auto 18px;display:block}
.login-card h1{color:#fff;font-size:22px;font-weight:700;letter-spacing:.3px}
.login-card .en{color:var(--gray2);font-size:12px;font-weight:400;letter-spacing:2px;
  text-transform:uppercase;margin-top:4px;margin-bottom:6px}
.login-sub{color:#9ca3af;font-size:13px;margin-bottom:26px}
.login-card input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid #2a2a2a;
  background:#171717;color:#fff;text-align:center;letter-spacing:3px;margin-bottom:14px;outline:none}
.login-card input:focus{border-color:var(--red)}
.login-card button{width:100%;padding:13px;border-radius:10px;background:var(--red);
  color:#fff;font-weight:600;font-size:15px;transition:.15s}
.login-card button:hover{background:var(--red-d)}
.login-err{color:#ff5a5a;font-size:13px;min-height:18px;margin-top:12px}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:40;background:var(--black);color:#fff;
  display:flex;align-items:center;gap:14px;padding:0 22px;height:60px;box-shadow:var(--shadow-md)}
.topbar .brand{display:flex;align-items:center;gap:11px}
.topbar .brand svg{width:34px;height:34px}
.topbar .brand b{font-size:16px;font-weight:700}
.topbar .brand span{font-size:10px;letter-spacing:2px;color:var(--gray2);display:block;text-transform:uppercase}
.topbar .spacer{flex:1}
.topbar .tbtn{color:#cfcfcf;display:flex;align-items:center;gap:7px;font-size:13px;
  padding:8px 12px;border-radius:8px;transition:.15s}
.topbar .tbtn:hover{background:#1f1f1f;color:#fff}

/* ===== LAYOUT ===== */
.wrap{max-width:1280px;margin:0 auto;padding:26px 22px 60px}
.page-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.page-head h2{font-size:21px;font-weight:700}
.page-head .spacer{flex:1}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:9px;
  font-weight:600;font-size:14px;transition:.15s}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-d)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:#000}
.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--gray2)}
.btn-sm{padding:7px 13px;font-size:13px}

/* ===== CARDS LIST ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);transition:.18s;cursor:pointer;position:relative;
  border-top:3px solid var(--red)}
.rcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rcard h3{font-size:16px;font-weight:700;margin-bottom:4px;padding-left:70px}
.rcard .client{color:var(--gray);font-size:13px;margin-bottom:14px}
.rcard .meta{display:flex;flex-direction:column;gap:7px;font-size:13px;color:#444}
.rcard .meta div{display:flex;align-items:center;gap:8px}
.rcard .meta svg{width:15px;height:15px;color:var(--red)}
.badge{position:absolute;top:18px;left:18px;font-size:11px;font-weight:600;
  padding:4px 11px;border-radius:20px}
.badge.draft{background:#fef3c7;color:#92400e}
.badge.final{background:#dcfce7;color:#166534}
.empty{text-align:center;padding:80px 20px;color:var(--gray)}
.empty svg{width:48px;height:48px;color:var(--gray2);margin-bottom:14px}

/* ===== CREATE FORM ===== */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow)}
.panel h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px;
  padding-bottom:12px;border-bottom:1px solid var(--line)}
.panel h3 svg{color:var(--red);width:19px;height:19px}
.panel + .panel{margin-top:20px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12.5px;font-weight:600;color:#444;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);
  border-radius:8px;background:var(--soft);outline:none;transition:.15s;color:var(--ink)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--red);background:#fff}
.field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* damage toggle */
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);
  background:var(--soft);font-weight:600;font-size:13px;color:#555;transition:.15s}
.seg button:hover{border-color:var(--gray2)}
.seg button.on{background:var(--red);border-color:var(--red);color:#fff}

/* photos */
.dropzone{border:2px dashed var(--line);border-radius:10px;padding:26px;text-align:center;
  color:var(--gray);cursor:pointer;transition:.15s;background:var(--soft)}
.dropzone:hover{border-color:var(--red);color:var(--red)}
.dropzone svg{width:30px;height:30px;margin-bottom:8px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:14px}
.thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.65);color:#fff;
  width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.thumb .del svg{width:13px;height:13px}
.thumb .up{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:11px}

/* notes / recs list builder */
.adder{display:flex;gap:8px;margin-bottom:12px;align-items:stretch}
.adder input{flex:1}
.adder select{width:120px}
.items{display:flex;flex-direction:column;gap:9px}
.item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:9px;
  background:var(--soft);border:1px solid var(--line);font-size:13.5px}
.item .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;margin-top:1px}
.item .x{margin-right:auto;color:var(--gray2);padding:2px}
.item .x:hover{color:var(--red)}
.item .num{width:22px;height:22px;border-radius:6px;background:var(--red);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tag.danger{background:#fee2e2;color:#b91c1c}
.tag.warn{background:#ffedd5;color:#c2410c}
.tag.note{background:#e5e7eb;color:#374151}
.bd-danger{border-right:3px solid #dc2626}
.bd-warn{border-right:3px solid #ea580c}
.bd-note{border-right:3px solid #9ca3af}

/* preview */
.preview-wrap{margin-top:22px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.preview-bar{background:var(--ink);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:13px}
.preview-bar svg{color:var(--red)}
.preview-bar .spacer{flex:1}
.preview-body{padding:26px;max-height:560px;overflow:auto;background:#eee}
.actions{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);
  padding:14px 22px;display:flex;gap:12px;justify-content:flex-end;margin-top:22px;
  border-radius:0 0 var(--radius) var(--radius);box-shadow:0 -4px 12px rgba(0,0,0,.04);z-index:30}

/* toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:13px 20px;
  border-radius:10px;font-size:14px;box-shadow:var(--shadow-md);z-index:200;transform:translateY(20px);
  opacity:0;transition:.25s;display:flex;align-items:center;gap:10px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok svg{color:#4ade80}
#toast.err svg{color:#ff6b6b}

/* ===== REPORT DOCUMENT (shared with print tab) ===== */
.doc{background:#fff;width:100%;max-width:800px;margin:0 auto;font-size:13px;color:#1a1a1a}
.doc .cover{background:var(--black);color:#fff;padding:42px 40px}
.doc .cover-top{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.doc .cover-top svg{width:56px;height:56px;flex-shrink:0}
.doc .cover-top b{font-size:19px;font-weight:700;display:block}
.doc .cover-top span{font-size:10px;letter-spacing:2.5px;color:#b9b9b9;text-transform:uppercase}
.doc .cbadge{display:inline-block;background:var(--red);color:#fff;font-size:12px;font-weight:600;
  padding:5px 15px;border-radius:20px;margin-bottom:18px}
.doc .cproj{font-size:30px;font-weight:700;line-height:1.25;margin-bottom:8px}
.doc .cclient{font-size:15px;color:#cfcfcf;margin-bottom:30px}
.doc .crow{display:flex;flex-wrap:wrap;gap:30px;border-top:1px solid #333;padding-top:20px}
.doc .crow .ci span{display:block;font-size:10px;letter-spacing:1px;color:#888;text-transform:uppercase;margin-bottom:3px}
.doc .crow .ci b{font-size:13.5px;font-weight:600;color:#fff}
.doc .body{padding:36px 40px}
.doc .sec{margin-bottom:30px}
.doc .sec-h{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;
  margin-bottom:15px;color:var(--black)}
.doc .sec-h .bar{width:4px;height:18px;background:var(--red);border-radius:2px}
.doc .pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.doc .pcell{background:#f6f6f6;border-right:3px solid var(--red);border-radius:6px;padding:11px 13px}
.doc .pcell span{display:block;font-size:10.5px;color:#777;margin-bottom:3px}
.doc .pcell b{font-size:14px;font-weight:600}
.doc .desc{background:#fafafa;border:1px solid #eee;border-radius:8px;padding:16px 18px;
  font-size:13.5px;line-height:1.7;color:#333}
.doc .photos{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.doc .photo{border-radius:8px;overflow:hidden;border:1px solid #e5e5e5}
.doc .photo img{width:100%;height:200px;object-fit:cover;display:block}
.doc .photo .cap{background:#1a1a1a;color:#fff;font-size:11.5px;padding:8px 11px;display:flex;align-items:center;gap:8px}
.doc .photo .cap .n{background:var(--red);width:18px;height:18px;border-radius:4px;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc .nlist{display:flex;flex-direction:column;gap:10px}
.doc .note{padding:12px 15px;border-radius:8px;font-size:13px;display:flex;gap:11px;align-items:flex-start}
.doc .note .lab{font-size:10px;font-weight:700;padding:2px 9px;border-radius:5px;white-space:nowrap;margin-top:1px}
.doc .note.danger{background:#fef2f2;border-right:4px solid #dc2626}
.doc .note.warn{background:#fff7ed;border-right:4px solid #ea580c}
.doc .note.note{background:#f7f7f7;border-right:4px solid #9ca3af}
.doc .rlist{display:flex;flex-direction:column;gap:10px}
.doc .rec{display:flex;gap:12px;align-items:flex-start;font-size:13.5px;line-height:1.6}
.doc .rec .rn{background:var(--red);color:#fff;width:26px;height:26px;border-radius:7px;
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc .footer{border-top:2px solid var(--red);padding:16px 40px;display:flex;align-items:center;
  font-size:11px;color:#666;background:#fafafa}
.doc .footer .c{flex:1;text-align:center;color:#999;letter-spacing:1px}
.doc .footer b{color:var(--black);font-weight:600}
.doc .ph-empty{color:#aaa;font-size:13px;padding:14px;text-align:center;background:#fafafa;border-radius:8px}
@media(max-width:880px){.grid2{grid-template-columns:1fr}.doc .pgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="login-logo" id="loginLogo"></div>
    <h1>مشاتي السعودية</h1>
    <div class="en">Saudi Mshati</div>
    <div class="login-sub">نظام التقارير الأولية لمواقع البناء</div>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="off">
    <button id="loginBtn">دخول</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">
      <span id="barLogo"></span>
      <div><b>مشاتي السعودية</b><span>Saudi Mshati</span></div>
    </div>
    <div class="spacer"></div>
    <button class="tbtn" id="navHome"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg> التقارير</button>
    <button class="tbtn" id="logoutBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M16 17l5-5-5-5M21 12H9M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg> خروج</button>
  </div>

  <!-- LIST PAGE -->
  <div id="listPage" class="wrap">
    <div class="page-head">
      <h2>التقارير الأولية</h2>
      <div class="spacer"></div>
      <button class="btn btn-red" id="newBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> تقرير جديد</button>
    </div>
    <div id="cards" class="cards"></div>
  </div>

  <!-- CREATE PAGE -->
  <div id="createPage" class="wrap hidden">
    <div class="page-head">
      <button class="btn btn-ghost btn-sm" id="backBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg> رجوع</button>
      <h2 id="createTitle">تقرير جديد</h2>
      <div class="spacer"></div>
      <span class="badge" id="statusBadge"></span>
    </div>

    <div class="grid2">
      <!-- RIGHT column (client + building) -->
      <div>
        <div class="panel">
          <h3><svg class="ic" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg> بيانات العميل والمشروع</h3>
          <div class="field"><label>اسم العميل</label><input id="f_client" placeholder="اسم العميل / الجهة"></div>
          <div class="field"><label>اسم المشروع</label><input id="f_project" placeholder="اسم المشروع"></div>
          <div class="field"><label>الموقع</label><input id="f_location" placeholder="المدينة / الحي / العنوان"></div>
          <div class="row3">
            <div class="field"><label>رقم التقرير</label><input id="f_repnum" placeholder="REP-..."></div>
            <div class="field"><label>تاريخ الزيارة</label><input id="f_date" type="date"></div>
            <div class="field"><label>نوع التقرير</label>
              <select id="f_type">
                <option>تقرير أولي</option>
                <option>تقرير فني</option>
                <option>تقرير ترميم تراثي</option>
                <option>تقرير إنشائي</option>
                <option>تقرير معاينة</option>
              </select>
            </div>
          </div>
          <div class="field"><label>اسم المهندس</label><input id="f_engineer" placeholder="المهندس المسؤول"></div>
        </div>

        <div class="panel">
          <h3><svg class="ic" viewBox="0 0 24 24"><path d="M3 21h18M4 21V8l8-5 8 5v13M9 21v-6h6v6"/></svg> وصف المبنى</h3>
          <div class="row3">
            <div class="field"><label>عدد الطوابق</label><input id="f_floors" type="number" min="0" placeholder="0"></div>
            <div class="field"><label>المساحة (م²)</label><input id="f_area" type="number" min="0" placeholder="0"></div>
            <div class="field"><label>مواد البناء</label><input id="f_materials" placeholder="طين / حجر / خرسانة"></div>
          </div>
          <div class="field">
            <label>درجة التلف</label>
            <div class="seg" id="damageSeg">
              <button data-v="خفيف">خفيف</button>
              <button data-v="متوسط">متوسط</button>
              <button data-v="شديد">شديد</button>
            </div>
          </div>
          <div class="field"><label>وصف الحالة العامة</label>
            <textarea id="f_desc" placeholder="وصف عام لحالة المبنى والملاحظات الرئيسية..."></textarea></div>
        </div>
      </div>

      <!-- LEFT column (photos + notes + recs) -->
      <div>
        <div class="panel">
          <h3><svg class="ic" viewBox="0 0 24 24"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg> الصور الميدانية</h3>
          <div class="dropzone" id="dropzone">
            <svg class="ic" viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>
            <div>اضغط لاختيار الصور أو اسحبها هنا</div>
          </div>
          <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
          <div class="thumbs" id="thumbs"></div>
        </div>

        <div class="panel">
          <h3><svg class="ic" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.7 3.9a2 2 0 00-3.4 0z"/></svg> الملاحظات الميدانية</h3>
          <div class="adder">
            <select id="noteType">
              <option value="danger">خطر</option>
              <option value="warn">تحذير</option>
              <option value="note">ملاحظة</option>
            </select>
            <input id="noteInput" placeholder="نص الملاحظة..." onkeydown="if(event.key==='Enter')addNote()">
            <button class="btn btn-dark btn-sm" onclick="addNote()">إضافة</button>
          </div>
          <div class="items" id="notesList"></div>
        </div>

        <div class="panel">
          <h3><svg class="ic" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg> التوصيات</h3>
          <div class="adder">
            <input id="recInput" placeholder="نص التوصية..." onkeydown="if(event.key==='Enter')addRec()">
            <button class="btn btn-dark btn-sm" onclick="addRec()">إضافة</button>
          </div>
          <div class="items" id="recsList"></div>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-wrap">
      <div class="preview-bar">
        <svg class="ic" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        المعاينة الحية
        <div class="spacer"></div>
        <span style="color:#bbb">تتحدث تلقائياً مع كل تعديل</span>
      </div>
      <div class="preview-body"><div id="docPreview"></div></div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" id="saveDraftBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> حفظ مسودة</button>
      <button class="btn btn-dark" id="finalizeBtn"><svg class="ic" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg> اعتماد نهائي</button>

function toast(msg, type){ const t=$('toast'); const ic = type==='err'

/* ============================================================
   Supabase REST helpers
   ============================================================ */
async function dbList(){
  const r = await fetch(REST+'/reports?select=*&order=created_at.desc', { headers:HEAD });
  if(!r.ok) throw new Error('list '+r.status);
  return r.json();
}
async function dbInsert(row){
  const r = await fetch(REST+'/reports', { method:'POST',
    headers:{...HEAD,'Prefer':'return=representation'}, body:JSON.stringify(row) });
  if(!r.ok) throw new Error('insert '+r.status+' '+await r.text());
  return (await r.json())[0];
}
async function dbUpdate(id,row){
  const r = await fetch(REST+'/reports?id=eq.'+id, { method:'PATCH',
    headers:{...HEAD,'Prefer':'return=representation'}, body:JSON.stringify(row) });
  if(!r.ok) throw new Error('update '+r.status+' '+await r.text());
  return (await r.json())[0];
}
async function uploadPhoto(file){
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = 'reports/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
  const r = await fetch(SB_URL+'/storage/v1/object/'+SB_BUCKET+'/'+path, {
    method:'POST',
    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':file.type||'image/jpeg' },
    body:file });
  if(!r.ok) throw new Error('upload '+r.status+' '+await r.text());
  return SB_URL+'/storage/v1/object/public/'+SB_BUCKET+'/'+path;
}

  renderCards(rows);
}
function renderCards(rows){
  const c = $('cards'); c.innerHTML='';
  if(!rows.length){
    c.innerHTML = '<div class="empty"><svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><div>لا توجد تقارير بعد</div><div style="font-size:13px;margin-top:6px">ابدأ بإنشاء تقرير جديد</div></div>';
    return;
  }
  rows.forEach(r=>{
    const card = document.createElement('div');
    card.className='rcard';
    const isFinal = r.status==='final';
    card.innerHTML =
      '<span class="badge '+(isFinal?'final':'draft')+'">'+(isFinal?'نهائي':'مسودة')+'</span>'+
      '<h3>'+esc(r.project_name||'بدون عنوان')+'</h3>'+
      '<div class="client">'+esc(r.client_name||'—')+'</div>'+

  DRAFT.observations.forEach((o,i)=>{

}

/* ============================================================
   PHOTOS
   ============================================================ */
$('dropzone').addEventListener('click', ()=>$('fileInput').click());
$('dropzone').addEventListener('dragover', e=>{ e.preventDefault(); });
$('dropzone').addEventListener('drop', e=>{ e.preventDefault(); handleFiles(e.dataTransfer.files); });
$('fileInput').addEventListener('change', e=>{ handleFiles(e.target.files); e.target.value=''; });

async function handleFiles(files){
  for(const f of files){
    if(!f.type.startsWith('image/')) continue;
    const ph = { url:'', caption:f.name.replace(/\.[^.]+$/,''), uploading:true, local:URL.createObjectURL(f) };
    DRAFT.photos.push(ph); renderThumbs(); renderPreview();
    try{
      ph.url = await uploadPhoto(f); ph.uploading=false;
    }catch(err){
      const i=DRAFT.photos.indexOf(ph); if(i>-1) DRAFT.photos.splice(i,1);
      toast('فشل رفع صورة: '+err.message,'err');
    }
    renderThumbs(); renderPreview();
  }
}
function renderThumbs(){
  const T=$('thumbs'); T.innerHTML='';
  DRAFT.photos.forEach((p,i)=>{
    const d=document.createElement('div'); d.className='thumb';
    const src = p.url || p.local;
    d.innerHTML='<img src="'+src+'">'+(p.uploading?'<div class="up">رفع...</div>':'');
    const del=document.createElement('button'); del.className='del';
    del.innerHTML='<svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>';
    del.onclick=()=>{ DRAFT.photos.splice(i,1); renderThumbs(); renderPreview(); };
    d.appendChild(del); T.appendChild(d);
  });
}

/* ============================================================
   REPORT DOCUMENT HTML  (used in preview + print tab)
   ============================================================ */
function buildDocHTML(){
  const d=DRAFT;
  const fld=(label,val)=> '<div class="pcell"><span>'+label+'</span><b>'+esc(val||'—')+'</b></div>';
  // project grid
  const pgrid = '<div class="pgrid">'+
    fld('عدد الطوابق', d.floors)+ fld('المساحة (م²)', d.area)+ fld('مواد البناء', d.materials)+
    fld('درجة التلف', d.damage_level)+ fld('نوع التقرير', d.report_type)+ fld('اسم المهندس', d.engineer_name)+
    '</div>';
  // photos
  let photosSec='';
  const ready = d.photos.filter(p=>p.url);
  if(ready.length){
    photosSec='<div class="sec"><div class="sec-h"><span class="bar"></span>الصور الميدانية</div><div class="photos">'+
      ready.map((p,i)=>'<div class="photo"><img src="'+esc(p.url)+'"><div class="cap"><span class="n">'+(i+1)+'</span>'+esc(p.caption||('صورة '+(i+1)))+'</div></div>').join('')+
      '</div></div>';
  }
  // notes
  let notesSec='';
  if(d.observations.length){
    const lab={danger:'خطر',warn:'تحذير',note:'ملاحظة'};
    const tlab={danger:'#dc2626',warn:'#ea580c',note:'#6b7280'};
    notesSec='<div class="sec"><div class="sec-h"><span class="bar"></span>الملاحظات الميدانية</div><div class="nlist">'+
      d.observations.map(o=>'<div class="note '+o.type+'"><span class="lab" style="background:'+(o.type==='danger'?'#fee2e2':o.type==='warn'?'#ffedd5':'#e5e7eb')+';color:'+tlab[o.type]+'">'+lab[o.type]+'</span><span>'+esc(o.text)+'</span></div>').join('')+
      '</div></div>';
  }
  // recs
  let recsSec='';
  if(d.recommendations.length){
    recsSec='<div class="sec"><div class="sec-h"><span class="bar"></span>التوصيات</div><div class="rlist">'+
      d.recommendations.map((r,i)=>'<div class="rec"><span class="rn">'+(i+1)+'</span><span>'+esc(r)+'</span></div>').join('')+
      '</div></div>';
  }
  // desc
  let descSec='';
  if(d.description && d.description.trim()){
    descSec='<div class="sec"><div class="sec-h"><span class="bar"></span>وصف الحالة العامة</div><div class="desc">'+esc(d.description)+'</div></div>';
  }

  return ''+
  '<div class="doc">'+
    '<div class="cover">'+
      '<div class="cover-top">'+logoHTML(56)+
        '<div><b>مشاتي السعودية</b><span>Saudi Mshati</span></div>'+
      '</div>'+
      '<div class="cbadge">'+esc(d.report_type||'تقرير أولي')+'</div>'+
      '<div class="cproj">'+esc(d.project_name||'اسم المشروع')+'</div>'+
      '<div class="cclient">'+esc(d.client_name||'اسم العميل')+'</div>'+
      '<div class="crow">'+
        '<div class="ci"><span>الموقع</span><b>'+esc(d.location||'—')+'</b></div>'+
        '<div class="ci"><span>تاريخ الزيارة</span><b>'+esc(d.visit_date||'—')+'</b></div>'+
        '<div class="ci"><span>رقم التقرير</span><b>'+esc(d.report_num||'—')+'</b></div>'+
        '<div class="ci"><span>المهندس</span><b>'+esc(d.engineer_name||'—')+'</b></div>'+
      '</div>'+
    '</div>'+
    '<div class="body">'+
      '<div class="sec"><div class="sec-h"><span class="bar"></span>بيانات المشروع</div>'+pgrid+'</div>'+
      descSec + photosSec + notesSec + recsSec +
    '</div>'+
    '<div class="footer"><b>مشاتي السعودية</b><span class="c">وثيقة سرية</span><span>'+esc(d.report_num||'')+'</span></div>'+
  '</div>';
}
function renderPreview(){ $('docPreview').innerHTML = buildDocHTML(); }

/* ============================================================
   SAVE
   ============================================================ */
function payload(){
  return {
    report_num:DRAFT.report_num, report_type:DRAFT.report_type, client_name:DRAFT.client_name,
    project_name:DRAFT.project_name, location:DRAFT.location, visit_date:DRAFT.visit_date||null,
    engineer_name:DRAFT.engineer_name, floors:DRAFT.floors||null, area:DRAFT.area||null,
    materials:DRAFT.materials, damage_level:DRAFT.damage_level, description:DRAFT.description,
    observations:DRAFT.observations,
    recommendations:DRAFT.recommendations,
    photos:DRAFT.photos.filter(p=>p.url).map(p=>({url:p.url,caption:p.caption})),
    status:DRAFT.status, updated_at:new Date().toISOString()
  };
}
async function save(status){
  DRAFT.status = status;
  const sb=$('statusBadge'); sb.className='badge '+(status==='final'?'final':'draft');
  sb.textContent = status==='final'?'نهائي':'مسودة';
  const body = payload();
  try{
    if(DRAFT.id){ await dbUpdate(DRAFT.id, body); }
    else { const row = await dbInsert(body); DRAFT.id = row.id; }
    toast(status==='final'?'تم اعتماد التقرير نهائياً':'تم حفظ المسودة','ok');
  }catch(e){ toast('تعذّر الحفظ: '+e.message,'err'); }
}
$('saveDraftBtn').addEventListener('click', ()=>save('draft'));
$('finalizeBtn').addEventListener('click', ()=>save('final'));
